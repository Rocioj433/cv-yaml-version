<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              DEFAULT: '#ffffff',
              dark: '#1e1e2e',
            },
            panel: {
              DEFAULT: '#f8f9fa',
              dark: '#2a2a3d',
            },
            border: {
              DEFAULT: '#e2e8f0',
              dark: '#3a3a4f',
            },
          },
        },
      },
    };

    // Load theme on page load
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-serif: 'EB Garamond', 'Times New Roman', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      transition: background-color 0.2s, color 0.2s;
    }

    .dark body,
    body.dark {
      background-color: #1e1e2e;
      color: #e2e8f0;
    }

    /* Custom scrollbar */
    .editor-scroll::-webkit-scrollbar { width: 6px; }
    .editor-scroll::-webkit-scrollbar-track { background: transparent; }
    .editor-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .dark .editor-scroll::-webkit-scrollbar-thumb {
      background: #4a4a5e;
    }

    /* Form inputs */
    .form-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--tw-border, #e2e8f0);
      border-radius: 0.375rem;
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: var(--tw-bg, #ffffff);
      color: var(--tw-color, #1a202c);
    }

    .form-input:focus {
      outline: none;
      border-color: #64748b;
      box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.15);
    }

    .dark .form-input {
      --tw-border: #3a3a4f;
      --tw-bg: #2a2a3d;
      --tw-color: #e2e8f0;
    }

    .form-textarea {
      resize: vertical;
      min-height: 5rem;
    }

    /* Collapsible section */
    .section-toggle {
      cursor: pointer;
      user-select: none;
    }

    .section-toggle .chevron {
      transition: transform 0.2s;
    }

    .section-toggle.collapsed .chevron {
      transform: rotate(-90deg);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-primary {
      background: #334155;
      color: white;
    }
    .btn-primary:hover { background: #475569; }
    .dark .btn-primary {
      background: #475569;
      color: #f1f5f9;
    }
    .dark .btn-primary:hover { background: #64748b; }

    .btn-secondary {
      background: #e2e8f0;
      color: #334155;
    }
    .btn-secondary:hover { background: #cbd5e1; }
    .dark .btn-secondary {
      background: #3a3a4f;
      color: #e2e8f0;
    }
    .dark .btn-secondary:hover { background: #4a4a5e; }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }
    .btn-danger:hover { background: #fecaca; }
    .dark .btn-danger {
      background: #3f1f1f;
      color: #fca5a5;
    }
    .dark .btn-danger:hover { background: #5f2f2f; }

    .btn-icon {
      padding: 0.375rem;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      border: none;
      color: #64748b;
    }
    .btn-icon:hover { background: #e2e8f0; }
    .dark .btn-icon { color: #94a3b8; }
    .dark .btn-icon:hover { background: #3a3a4f; }

    /* Highlight list */
    .highlight-item {
      display: flex;
      gap: 0.375rem;
      align-items: flex-start;
      margin-bottom: 0.25rem;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transform: translateY(1rem);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .toast-success { background: #065f46; color: #d1fae5; }
    .toast-error { background: #7f1d1d; color: #fecaca; }
    .toast-info { background: #1e3a5f; color: #dbeafe; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid #e2e8f0;
      border-top-color: #475569;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Preview iframe */
    #preview-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #f0f0f0;
      border-radius: 0.375rem;
      overflow: hidden;
    }
    .dark #preview-frame {
      box-shadow: 0 0 0 1px #3a3a4f;
    }

    .preview-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e2e8f0;
    }
    .dark .preview-container {
      background: #16162a;
    }

    /* Section card */
    .section-card {
      border: 1px solid #e2e8f0;
      border-radius: 0.625rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .section-card .section-content {
      padding: 1rem;
    }
    .section-card .section-content > * + * {
      margin-top: 0.75rem;
    }
    .dark .section-card {
      border-color: #3a3a4f;
    }

    /* Entry card (education, experience, etc) */
    .entry-card {
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 0.625rem;
      position: relative;
      transition: border-color 0.2s;
    }
    .dark .entry-card {
      border-color: #3a3a4f;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .editor-layout {
        flex-direction: column;
      }
      .editor-panel, .preview-panel {
        width: 100% !important;
      }
      .preview-panel {
        height: 55vh !important;
        border-left: none !important;
        border-top: 1px solid var(--tw-border, #e2e8f0);
      }
      .editor-panel {
        height: auto !important;
        max-height: 75vh;
      }
      .editor-layout {
        height: auto !important;
      }
      .editor-layout > .preview-panel {
        flex-shrink: 0;
      }
    }
    @media (max-width: 640px) {
      .header-actions .btn span {
        display: none;
      }
      .brand-sub {
        display: none;
      }
      .editor-panel {
        padding: 0.625rem;
      }
      .section-card .grid-cols-2 {
        grid-template-columns: 1fr !important;
      }
    }
    @media (min-width: 641px) and (max-width: 900px) {
      .section-card .grid-cols-2 {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#1e1e2e] dark:text-gray-100">

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay">
    <div class="bg-white dark:bg-[#2a2a3d] rounded-xl p-6 flex items-center gap-3 shadow-lg">
      <div class="spinner"></div>
      <span class="text-sm font-medium text-gray-600 dark:text-gray-300">Generando...</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Report Modal -->
  <div id="report-modal" class="fixed inset-0 z-[9997] flex items-start justify-center pt-12 px-4 opacity-0 pointer-events-none transition-opacity duration-200" style="background:rgba(0,0,0,0.5);">
    <div class="bg-white dark:bg-[#1e1e2e] rounded-xl shadow-2xl w-full max-w-xl max-h-[80vh] overflow-y-auto border border-border dark:border-[#3a3a4f]">
      <div class="p-4 sm:p-5 text-sm space-y-3" id="report-content"></div>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-[#1e1e2e]/90 backdrop-blur border-b border-border dark:border-[#3a3a4f]">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-lg font-semibold tracking-tight">CV Editor</span>
        <span class="brand-sub text-xs text-gray-400 dark:text-gray-500 hidden sm:inline">YAML-powered resume builder</span>
      </div>
      <div class="header-actions flex items-center gap-1 sm:gap-2">
        <button id="btn-save" class="btn btn-primary text-xs sm:text-sm px-2 sm:px-3" onclick="saveCV()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
          <span>Guardar</span>
        </button>
        <button id="btn-pdf" class="btn btn-primary text-xs sm:text-sm px-2 sm:px-3" onclick="generatePDF()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span>PDF</span>
        </button>
        <div class="w-px h-5 bg-gray-300 dark:bg-gray-600 mx-0.5 sm:mx-1"></div>
        <button class="btn btn-secondary text-xs px-1.5 sm:px-2 py-1" onclick="runAnalyze()" title="Analizar datos sensibles y ATS">🔍</button>
        <button class="btn btn-secondary text-xs px-1.5 sm:px-2 py-1" onclick="runSanitize()" title="Sanitizar datos para GitHub">🧹</button>
        <button class="btn btn-secondary text-xs px-1.5 sm:px-2 py-1" onclick="showReport()" title="Ver último reporte">📋</button>
        <button id="theme-toggle" class="btn-icon ml-1 sm:ml-2" onclick="toggleTheme()" title="Cambiar tema">
          <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moon-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="editor-layout flex max-w-7xl mx-auto" style="height: calc(100vh - 3.5rem);">

    <!-- LEFT: EDITOR -->
    <div class="editor-panel w-1/2 border-r border-border dark:border-[#3a3a4f] overflow-y-auto editor-scroll p-5 pb-10">
      <form id="cv-form" class="space-y-5">

        <!-- PERSONAL INFO -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Información Personal</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Nombre completo</label>
              <input class="form-input" id="field-name" placeholder="John Doe">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Título / Headline</label>
              <input class="form-input" id="field-headline" placeholder="Fullstack Developer">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">Ubicación</label>
                <input class="form-input" id="field-location" placeholder="San Francisco, CA">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">Email</label>
                <input class="form-input" id="field-email" type="email" placeholder="john@example.com">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">LinkedIn (URL)</label>
                <input class="form-input" id="field-linkedin" placeholder="https://linkedin.com/in/...">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">GitHub (URL)</label>
                <input class="form-input" id="field-github" placeholder="https://github.com/...">
              </div>
            </div>
          </div>
        </div>

        <!-- SUMMARY -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Perfil Profesional</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4">
            <textarea class="form-input form-textarea" id="field-summary" rows="4" placeholder="Escribí un resumen profesional..."></textarea>
          </div>
        </div>

        <!-- EDUCATION -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Educación</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div id="education-list" class="space-y-2"></div>
            <button type="button" class="btn btn-secondary text-xs w-full" onclick="addEntry('education')">+ Agregar Educación</button>
          </div>
        </div>

        <!-- EXPERIENCE -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Experiencia</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div id="experience-list" class="space-y-2"></div>
            <button type="button" class="btn btn-secondary text-xs w-full" onclick="addEntry('experience')">+ Agregar Experiencia</button>
          </div>
        </div>

        <!-- PROJECTS -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Proyectos</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div id="projects-list" class="space-y-2"></div>
            <button type="button" class="btn btn-secondary text-xs w-full" onclick="addEntry('projects')">+ Agregar Proyecto</button>
          </div>
        </div>

        <!-- SKILLS -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Habilidades</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div id="skills-list" class="space-y-2"></div>
            <button type="button" class="btn btn-secondary text-xs w-full" onclick="addEntry('skills')">+ Agregar Skill</button>
          </div>
        </div>

        <!-- LANGUAGES -->
        <div class="section-card">
          <div class="section-toggle flex items-center justify-between px-4 py-3 bg-panel dark:bg-[#2a2a3d]" onclick="toggleSection(this)">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Idiomas</h3>
            <svg class="chevron w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="section-content p-4 space-y-3">
            <div id="languages-list" class="space-y-2"></div>
            <button type="button" class="btn btn-secondary text-xs w-full" onclick="addEntry('languages')">+ Agregar Idioma</button>
          </div>
        </div>

      </form>
    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="preview-panel w-1/2 flex flex-col">
      <div class="flex items-center justify-between px-4 py-2 border-b border-border dark:border-[#3a3a4f] bg-panel dark:bg-[#2a2a3d]">
        <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Previsualización</span>
        <button id="btn-refresh-preview" class="btn-icon" onclick="refreshPreview()" title="Actualizar preview">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
      <div class="flex-1 p-4 bg-gray-100 dark:bg-[#16162a] overflow-hidden" style="min-height:0;">
        <div class="preview-container mx-auto shadow-lg">
          <iframe id="preview-frame" srcdoc="<html><body style='display:flex;align-items:center;justify-content:center;height:100vh;margin:0;color:#94a3b8;font-family:sans-serif;font-size:14px;background:#f0f0f0;'><p>Cargando previsualización...</p></body></html>"></iframe>
        </div>
      </div>
    </div>

  </div>

  <script src="/app.js"></script>
</body>
</html>
